# Technical preview nginx config for ArtistCRM + PartyCRM.
#
# Target path on server:
# /etc/nginx/sites-available/artistcrm
#
# Both domains proxy to the same Next.js process.
# Next.js must listen on 127.0.0.1:3006.

upstream next_app {
    server 127.0.0.1:3006;
    keepalive 64;
}

server {
    listen 80;
    server_name www.artistcrm.ru;

    return 301 http://artistcrm.ru$request_uri;
}

server {
    listen 80;
    server_name www.partycrm.ru;

    return 301 http://partycrm.ru$request_uri;
}

server {
    listen 80;
    server_name artistcrm.ru partycrm.ru;

    client_max_body_size 25m;

    access_log /var/log/nginx/artistcrm.access.log;
    error_log  /var/log/nginx/artistcrm.error.log;

    location / {
        proxy_pass http://next_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location /_next/static/ {
        proxy_pass http://next_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
